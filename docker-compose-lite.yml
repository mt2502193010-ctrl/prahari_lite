version: '3.8'

services:
  prahari_lite_ids:
    build:
      context: .
      dockerfile: Dockerfile.lite
    image: prahari_lite_ids:local
    container_name: prahari_lite_ids
    ports:
      - "5001:5001"
    volumes:
      - ./models:/app/models:ro
      - ./outputs:/app/outputs:ro
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - prahari_lite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prahari_lite_dashboard:
    build:
      context: .
      dockerfile: Dockerfile.lite
    image: prahari_lite_ids:local
    container_name: prahari_lite_dashboard
    ports:
      - "5002:5002"
    depends_on:
      - prahari_lite_ids
    environment:
      IDS_LITE_URL: "http://prahari_lite_ids:5001"
      PYTHONUNBUFFERED: "1"
    command: ["python", "dashboard/dashboard_lite.py"]
    networks:
      - prahari_lite_network
    restart: unless-stopped

networks:
  prahari_lite_network:
    driver: bridge
    name: prahari_lite_network
